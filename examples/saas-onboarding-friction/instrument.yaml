# saas-onboarding-friction: v2 multi-round instrument that takes a
# panel through three sequential rounds — recall, severity, and
# would-fix — to surface where SaaS onboarding breaks down.
#
# Mixes free-text recall with a Likert (scale) severity rating, then
# uses themes from earlier rounds to anchor the validation question.
# Use with examples/saas-onboarding-friction/personas.yaml or any
# pack of mid-market SaaS users.
#
# Why v2 and not v3: this is a deliberate, fully-traversed assessment.
# Every panelist answers every round. No adaptive routing — that would
# make cross-panelist comparison harder when the synthesizer needs to
# aggregate severity scores across the full panel.

instrument:
  version: 2
  rounds:
    - name: recall
      questions:
        - text: >
            Think back to your first 48 hours with this product. Walk
            me through what you remember most vividly — good or bad.
            Skip the parts that felt routine.
          response_schema:
            type: text
          follow_ups:
            - "Was there a specific moment you almost gave up?"
            - "If you could rewind to minute 5, what would have helped?"

        - text: >
            Of everything you've learned about the product since, what
            do you wish the onboarding had taught you on day one?
          response_schema:
            type: text

    - name: severity
      depends_on: recall
      questions:
        - text: >
            On a scale of 1–5, how painful was the friction you
            described in the first round? 1 = barely noticed, 3 =
            frustrating but manageable, 5 = nearly made me quit.
          response_schema:
            type: scale
            min: 1
            max: 5

        - text: >
            On a scale of 1–5, how confident are you that a friend
            in your role would push through the same friction without
            giving up? 1 = no chance, 5 = they'd breeze through.
          response_schema:
            type: scale
            min: 1
            max: 5
          follow_ups:
            - "What about your friend's situation makes you say that?"

        - text: >
            Earlier the panel surfaced "{theme_0}" as a recurring
            theme. In your own experience, was that the single
            biggest blocker, or one of several?
          response_schema:
            type: text

    - name: would_fix
      depends_on: severity
      questions:
        - text: >
            If you were the product manager for one week with one
            engineer, what's the single onboarding change you would
            ship? Be specific — feature, copy change, or removal.
          response_schema:
            type: text
          follow_ups:
            - "What signal would tell you it worked?"

        - text: >
            On a scale of 1–5, how likely would your fix be to bring
            back someone who churned in the first two weeks?
            1 = wouldn't move the needle, 5 = they'd convert.
          response_schema:
            type: scale
            min: 1
            max: 5

        - text: >
            What's the part of onboarding you would explicitly NOT
            change, even if the data said you should? Why?
          response_schema:
            type: text
