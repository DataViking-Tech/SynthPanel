[project]
name = "synth-panel"
version = "0.4.0"
description = "Run synthetic focus groups and user research panels using AI personas. CLI tool, Python library, any LLM."
requires-python = ">=3.10"
license = "MIT"
authors = [{name = "DataViking", email = "openclaw@dataviking.tech"}]
readme = "README.md"
keywords = ["llm", "research", "focus-group", "synthetic", "personas", "user-research", "ai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.27",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/DataViking-Tech/synth-panel"
Repository = "https://github.com/DataViking-Tech/synth-panel"
Issues = "https://github.com/DataViking-Tech/synth-panel/issues"

[project.optional-dependencies]
mcp = [
    "mcp>=1.0",
]
dev = [
    "pytest>=8.0",
]

[project.scripts]
synth-panel = "synth_panel.main:main"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"synth_panel.packs" = ["*.yaml"]
"synth_panel.packs.instruments" = ["*.yaml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "acceptance: live API acceptance tests (require ANTHROPIC_API_KEY)",
]
